name: Feature request
description: Suggest a new endpoint, model, or package improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is currently unsupported?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation reference
      description: Link or point to the relevant API documentation section.
